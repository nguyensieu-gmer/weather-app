<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outside</title>
  </head>
  <body>
    <div class="container">
      <div class="search">
        <input type="text" placeholder="Enter city name" id="input_city" />
        <button id="search_btn">
          <img src="./images/search.png" spellcheck="false" alt="" />
        </button>
      </div>
      <div class="error">
        <p>this city is not exist, please try again</p>
      </div>
      <div class="weather">
        <img src="./images/rain.png" alt="" id="weather_icon" />
        <h1 id="temp">21°C</h1>
        <h2 id="city">berlin</h2>
        <div class="detail">
          <div class="col">
            <img src="./images/humidity.png" alt="" />
            <div>
              <p id="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="./images/precippro.png" alt="" />
            <div>
              <p id="precipprob">100%</p>
              <p>Rain chance</p>
            </div>
          </div>
          <div class="col">
            <img src="./images/uvindex.png" alt="" />
            <div>
              <p id="uvindex">8</p>
              <p>UV index</p>
            </div>
          </div>
          <div class="col">
            <img src="./images/airquality.png" alt="" />
            <div>
              <p id="airquality">30</p>
              <p>Air quality</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
